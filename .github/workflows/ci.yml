name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: WordPress plugin zip is up to date
        # AUDIT #345 — the distributable zip (served by
        # /api/wordpress/plugin/download) had drifted from wordpress/gravhub-seo/
        # source and silently reshipped 3 already-fixed bugs to every new
        # client onboarded. Rebuilds into a temp file and fails CI if it
        # doesn't match the committed zip, so source and shipped artifact
        # can never silently diverge again.
        run: |
          node scripts/build-plugin-zip.js
          if ! git diff --quiet -- public/downloads/gravhub-seo.zip; then
            echo "::error::public/downloads/gravhub-seo.zip is out of date — run 'npm run build:plugin' and commit the result."
            git diff --stat -- public/downloads/gravhub-seo.zip
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          # Build runs without real secrets; lazy clients throw only when invoked.
          NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-key

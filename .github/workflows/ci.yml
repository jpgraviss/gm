name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build runs without real secrets; lazy clients throw only when invoked.
          NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-key

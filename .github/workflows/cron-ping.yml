name: Cron Ping

# AUDIT.md #16 — vercel.json's cron only runs /api/cron once daily
# (Vercel Hobby-tier cron limitation), so sequence step timing and uptime
# checks only ever advance once per ~24h regardless of their configured
# cadence. This pings the same CRON_SECRET-gated endpoint every 5 minutes
# from GitHub Actions instead — zero cost, no app code change, since
# /api/cron already self-throttles per site/sequence internally and is
# safe to call more often than the work it actually has to do.
#
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   CRON_TARGET_URL  — the deployed app's base URL, e.g. https://app.example.com
#   CRON_SECRET      — must match the CRON_SECRET env var set in Vercel

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit /api/cron
        run: |
          curl -fsS "${{ secrets.CRON_TARGET_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

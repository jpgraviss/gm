name: Cron Ping

# AUDIT.md #16 — vercel.json's cron only runs /api/cron once daily
# (Vercel Hobby-tier cron limitation), so sequence step timing and uptime
# checks only ever advance once per ~24h regardless of their configured
# cadence. This pings the same CRON_SECRET-gated endpoint every 5 minutes
# from GitHub Actions instead — zero cost, no app code change, since
# /api/cron already self-throttles per site/sequence internally and is
# safe to call more often than the work it actually has to do.
#
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   CRON_TARGET_URL  — the deployed app's base URL, e.g. https://app.example.com
#   CRON_SECRET      — must match the CRON_SECRET env var set in Vercel

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit /api/cron
        # /api/cron chains several sequential internal HTTP calls (sequence
        # execution, calendar sync, uptime checks, etc.) plus DB work, so an
        # occasional slow tick — a cold start, a busy moment — can run past a
        # naive single-shot curl and get reported as a hard failure even
        # though the next tick 5 minutes later picks up any missed work fine
        # (the route is explicitly self-throttling, see the comment above).
        # --max-time caps each attempt so a genuinely hung request doesn't
        # eat the whole job budget; --retry absorbs transient slowness/
        # network blips within the same run instead of alerting on them.
        run: |
          curl -fsS "${{ secrets.CRON_TARGET_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors
